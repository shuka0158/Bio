name: Update Bio data

# Refreshes data.json with live GitHub stats (repos, followers, stars) so the
# bio page stays current without manual edits.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}       # manual "Run workflow" button
  push:
    branches: [ main ]
    paths:
      - 'scripts/build-data.mjs'
      - '.github/workflows/update-bio.yml'

# Keep only the newest run; a stale queued run has no value.
concurrency:
  group: update-bio
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data.json from GitHub API
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_USER: ${{ github.repository_owner }}
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name  "bio-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json."
          else
            git commit -m "chore: refresh GitHub stats [skip ci]"
            git push
          fi
